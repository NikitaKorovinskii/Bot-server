script: |
  cd ~/vpn_bot
  git pull origin main

  docker stop vpn-bot || true
  docker rm vpn-bot || true

  docker build --no-cache -t vpn-bot .

  docker run -d \
    --name vpn-bot \
    --restart always \
    --env-file ~/vpn_bot/.env \
    -v /var/run/docker.sock:/var/run/docker.sock \
    vpn-bot