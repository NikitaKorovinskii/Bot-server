script: |
  set -e

  echo "🧱 cloning repo fresh"

  rm -rf /tmp/vpn-bot
  git clone https://github.com/NikitaKorovinskii/Bot-server.git /tmp/vpn-bot

  cd /tmp/vpn-bot

  echo "🧱 building image"
  docker build --no-cache -t vpn-bot .

  echo "🧹 restarting container"
  docker rm -f vpn-bot || true

  docker run -d \
    --name vpn-bot \
    --restart always \
    --env-file /root/vpn_bot/.env \
    -v /var/run/docker.sock:/var/run/docker.sock \
    vpn-bot