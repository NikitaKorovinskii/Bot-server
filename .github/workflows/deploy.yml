set -e

echo "🚀 START DEPLOY"

docker rm -f vpn-bot || true

docker build --no-cache -t vpn-bot https://github.com/NikitaKorovinskii/Bot-server.git

docker run -d \
  --name vpn-bot \
  --restart always \
  --env-file /root/vpn_bot/.env \
  -v /var/run/docker.sock:/var/run/docker.sock \
  vpn-bot

echo "✅ DONE"