name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/vpn_bot

            git pull origin main

            docker stop vpn-bot || true
            docker rm vpn-bot || true

            docker build --no-cache -t vpn-bot .

            docker run -d \
              --name vpn-bot \
              --restart always \
              --env-file ~/vpn_bot/.env \
              -v /var/run/docker.sock:/var/run/docker.sock \
              vpn-bot